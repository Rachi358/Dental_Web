services:
  - type: web
    name: dental-clinic
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 10000

# Note: If you want to retain your SQLite database (database.db) and uploaded images 
# across deployments, you will need to add a persistent disk. This requires a paid instance on Render.
# Uncomment the following block to use a disk (and update backend code to save in /data):
#    disk:
#      name: app-data
#      mountPath: /data
#      sizeGB: 1
